<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Studio Custom App</title>
    <!-- Kết nối file CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="chat-app">
        <div id="chat-header">
            <div class="status-dot"></div>
            <strong>Gemini Custom App</strong>
        </div>

        <div id="chat-window">
            <div class="message bot">Chào bạn! App đã sẵn sàng hỗ trợ.</div>
        </div>

        <div id="input-area">
            <input type="text" id="user-input" placeholder="Hỏi tôi bất cứ điều gì..." autocomplete="off">
            <button id="send-btn">
                <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
                    <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path>
                </svg>
            </button>
        </div>
    </div>

    <!-- Kết nối file JavaScript -->
    <script src="script.js"></script>
</body>
</html>
